<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Me</title>

<style>

body{
font-family:Poppins, sans-serif;
margin:0;
height:100vh;
display:flex;
background-color:#f5f5f5;
;
}

.left{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
padding:60px;
background:#f5f5f5;
}

h1{
font-size:45px;
margin-bottom:10px;
background:linear-gradient(90deg,#d746a0,#7b00ff);
-webkit-background-clip:text;
background-clip: text;
-webkit-text-fill-color:transparent;
}

p{
color:#777;
margin-bottom:30px;
}

input, textarea{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:8px;
background:#e9e9e9;
font-size:15px;
}

textarea{
height:120px;
resize:vertical;
}

button{
padding:14px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#d746a0,#7b00ff);
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.right{
flex:1;
background:url("assets/eiffel.png") center/cover no-repeat;
border-radius: 20px;
margin: 10px;
box-shadow: 0 4px 15px rgba(0,0,0,0.1);

}

.loader{
  display:none;
  width:18px;
  height:18px;
  border:3px solid white;
  border-top:3px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-left:10px;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

#sendBtn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

#statusMsg{
  margin-top:10px;
  font-size:14px;
  color:#666;
}

/* FLOATING NAVBAR */
.bottom-nav{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);

  display:flex;
  gap:30px;

  padding:12px 25px;
  border-radius:50px;

  background:rgba(20,20,30,0.6);
  backdrop-filter:blur(15px);

  border:1px solid rgba(255,255,255,0.1);

  box-shadow:0 10px 30px rgba(0,0,0,0.4);

  z-index:999;
}

/* NAV ITEMS */
.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;

  text-decoration:none;
  color:#aaa;
  font-size:12px;

  transition:0.3s;
}

/* ICON */
.nav-item i{
  width:20px;
  height:20px;
}

/* HOVER */
.nav-item:hover{
  color:white;
  transform:translateY(-2px);
}

/* ACTIVE TAB */
.nav-item.active{
  color:#ff4da6;
}

</style>
</head>

<body>

<div class="left">

<h1><b>Contact Me</b></h1>
<p>Wanna connect with me? Feel free to leave a message!</p>

<form id="contactForm">

<input type="text" id="name" placeholder="Your Name" required>
<input type="email" id="email" placeholder="Your Email" required>
<input type="text" id="subject" placeholder="Subject" required>
<textarea id="message" placeholder="Your Message"></textarea>

<button id="sendBtn" type="submit">
  <span id="btnText">Send Message</span>
  <span id="loader" class="loader"></span>
</button>

<p id="statusMsg"></p>

</form>

</div>

<div class="right"></div>

<script>

document.getElementById("contactForm").addEventListener("submit",async function(e){

e.preventDefault()

const formData = {
name:this.name.value,
email:this.email.value,
subject:this.subject.value,
message:this.message.value
}

const res = await fetch("http://localhost:5000/send-email",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(formData)
})

const data = await res.json()

alert(data.message)

})

</script>

<script src="contact.js"></script>

<div class="bottom-nav">

  <a href="index.html" class="nav-item">
    <i data-lucide="home"></i>
    <span>Home</span>
  </a>

  <a href="projects.html" class="nav-item">
    <i data-lucide="layout-dashboard"></i>
    <span>Projects</span>
  </a>

  <a href="experience.html" class="nav-item">
    <i data-lucide="briefcase"></i>
    <span>Experience</span>
  </a>

  <a href="contact.html" class="nav-item active">
    <i data-lucide="mail"></i>
    <span>Contact</span>
  </a>

  <a href="chat.html" class="nav-item">
  <i data-lucide="message-circle"></i>
  <span>Chat</span>
</a>

</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
  lucide.createIcons();
</script>

</body>
</html>
